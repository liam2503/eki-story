<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <turbo-frame id="feed-frame" class="flex flex-col gap-12 w-full p-6">
        <h2 class="text-black font-black text-4xl uppercase tracking-tighter mt-2 mb-4">Posts</h2>

        <div class="bg-white border-[4px] border-black p-6 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] rounded-[32px]">
          <h3 class="font-black text-xl mb-4 uppercase tracking-tighter">Miranda_25</h3>
          <div class="w-full h-64 bg-gray-200 mb-4 border-[4px] border-black overflow-hidden rounded-2xl">
             <img src="https://tokyo.digi-joho.com/images/guide/shinjuku-station-east-exit.jpg" class="w-full h-full object-cover">
          </div>
          <p class="text-sm font-bold">My first time in Shinjuku Station... HELP!</p>
          <p class="text-[10px] font-black text-gray-400 mt-3 uppercase tracking-widest">2 hours ago - NEW Station: Shinjuku Station (JR)</p>
        </div>

        <div class="bg-white border-[4px] border-black p-6 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] rounded-[32px]">
          <h3 class="font-black text-xl mb-4 uppercase tracking-tighter">Liam1234</h3>
          <div class="w-full h-64 bg-gray-200 mb-4 border-[4px] border-black overflow-hidden rounded-2xl">
            <img src="https://gohsomewhere.com/wp-content/uploads/2023/04/tokyo-station-1024x768.jpg" class="w-full h-full object-cover">
          </div>
          <p class="text-sm font-bold">Finally collected the stamp at Tokyo Station!!</p>
          <p class="text-[10px] font-black text-gray-400 mt-3 uppercase tracking-widest">5 hours ago - Stamp Collected!: Tokyo Station (JR)</p>
        </div>

    </turbo-frame>
</body>
</html>
