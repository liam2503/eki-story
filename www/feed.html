<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <turbo-frame id="feed-frame" class="flex flex-col w-full px-6 pt-8 pb-32 min-h-screen">
        <div class="flex items-center justify-between mb-8 mt-2">
            <h2 data-i18n="feed.title" class="text-black dark:text-[#FF80AB] font-black text-4xl uppercase tracking-tighter">Feed</h2>
            <div class="flex items-center gap-3">
                <div class="flex bg-gray-200 dark:bg-slate-700 p-1 rounded-xl border-[3px] border-black dark:border-slate-600">
                    <button id="feed-filter-all" data-i18n="feed.all" class="px-3 py-1 text-[10px] font-black uppercase tracking-tighter rounded-lg bg-white dark:bg-slate-800 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] text-black dark:text-white transition-all cursor-pointer">All</button>
                    <button id="feed-filter-friends" data-i18n="feed.friends" class="px-3 py-1 text-[10px] font-black uppercase tracking-tighter rounded-lg text-gray-500 hover:text-black dark:hover:text-white transition-all cursor-pointer">Friends</button>
                </div>
                <button id="new-post-btn" data-i18n="feed.addPost" class="bg-[#B2FF59] border-[4px] border-black rounded-xl px-5 py-2 font-black uppercase text-sm tracking-tighter shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-y-[4px] active:translate-x-[4px] transition-all">
                    + Post
                </button>
            </div>
        </div>
        <div id="feed-posts-list" class="flex flex-col gap-8 w-full"></div>
        <div class="flex justify-center mt-6 mb-4">
            <button id="feed-load-more-btn" data-i18n="feed.loadMore" class="hidden bg-white dark:bg-slate-800 border-[4px] border-black dark:border-slate-600 rounded-xl px-8 py-3 font-black uppercase text-sm tracking-tighter shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-y-[4px] active:translate-x-[4px] transition-all dark:text-white disabled:opacity-50 disabled:cursor-not-allowed">
                Load More
            </button>
        </div>
    </turbo-frame>
</body>
</html>
