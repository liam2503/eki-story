<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <turbo-frame id="list-frame" class="w-full space-y-6 block">
        
        <div class="bg-white border-4 border-[#009B73] p-6 shadow-xl rounded-2xl">
            <h2 class="text-2xl font-bold text-[#009B73] mb-4 cherry-bomb-one-regular">Den-en-toshi Line Status</h2>
            
            <div class="w-full bg-gray-100 border-2 border-black rounded-lg mb-6 overflow-hidden">
                <img src="https://www.tanseisha.co.jp/resource/61813_1.jpg" alt="Tokyu 2020 Series" class="w-full h-48 object-cover">
                <div class="p-2 bg-white border-t-2 border-black text-center">
                    <p class="text-sm font-bold uppercase tracking-widest">Model: Tokyu 2020 Series</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-green-50 p-3 rounded-lg border border-green-200 text-center">
                    <p class="text-xs text-green-700 uppercase font-bold">Visited</p>
                    <p class="text-2xl font-black text-green-600">3</p>
                </div>
                <div class="bg-gray-50 p-3 rounded-lg border border-gray-200 text-center">
                    <p class="text-xs text-gray-500 uppercase font-bold">Remaining</p>
                    <p class="text-2xl font-black text-gray-400">3</p>
                </div>
            </div>

            <div class="space-y-3">
                <h3 class="font-bold text-sm text-gray-500 uppercase tracking-widest">Station Log</h3>
                
                <div class="flex items-center justify-between p-2 bg-green-50 rounded-md">
                    <span class="font-bold text-green-800">Sangen-Jaya</span>
                    <span class="text-[10px] bg-green-500 text-white px-2 py-1 rounded-full font-bold">VISITED</span>
                </div>
                <div class="flex items-center justify-between p-2 bg-green-50 rounded-md">
                    <span class="font-bold text-green-800">Komazawa-daigaku</span>
                    <span class="text-[10px] bg-green-500 text-white px-2 py-1 rounded-full font-bold">VISITED</span>
                </div>
                <div class="flex items-center justify-between p-2 bg-green-50 rounded-md">
                    <span class="font-bold text-green-800">Sakura-shinmachi</span>
                    <span class="text-[10px] bg-green-500 text-white px-2 py-1 rounded-full font-bold">VISITED</span>
                </div>

                <div class="flex items-center justify-between p-2 bg-gray-50 rounded-md opacity-60">
                    <span class="font-bold text-gray-600">Yoga</span>
                    <span class="text-[10px] border border-gray-300 text-gray-400 px-2 py-1 rounded-full">LOCKED</span>
                </div>
                <div class="flex items-center justify-between p-2 bg-gray-50 rounded-md opacity-60">
                    <span class="font-bold text-gray-600">Ikejiri-Ohashi</span>
                    <span class="text-[10px] border border-gray-300 text-gray-400 px-2 py-1 rounded-full">LOCKED</span>
                </div>
                <div class="flex items-center justify-between p-2 bg-gray-50 rounded-md opacity-60">
                    <span class="font-bold text-gray-600">Futako-Tamagawa</span>
                    <span class="text-[10px] border border-gray-300 text-gray-400 px-2 py-1 rounded-full">LOCKED</span>
                </div>
            </div>
        </div>

    </turbo-frame>
</body>
</html>
