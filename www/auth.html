<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eki Story</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-gray-100 flex items-center justify-center font-sans p-6">
    <div class="w-full max-w-sm">

      <div class="text-center mb-10">
        <div class="w-20 h-20 bg-[#ed2079] rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="h-10 text-white stroke-current" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5.7 15C4.03377 15.6353 3 16.5205 3 17.4997C3 19.4329 7.02944 21 12 21C16.9706 21 21 19.4329 21 17.4997C21 16.5205 19.9662 15.6353 18.3 15M12 9H12.01M18 9C18 13.0637 13.5 15 12 18C10.5 15 6 13.0637 6 9C6 5.68629 8.68629 3 12 3C15.3137 3 18 5.68629 18 9ZM13 9C13 9.55228 12.5523 10 12 10C11.4477 10 11 9.55228 11 9C11 8.44772 11.4477 8 12 8C12.5523 8 13 8.44772 13 9Z"/>
          </svg>
        </div>
        <h1 class="text-4xl font-bold text-[#ed2079]" style="font-family:'Cherry Bomb One',cursive;">Eki Story</h1>
        <p class="text-gray-500 mt-1 text-sm">Track every station. Collect every stamp.</p>
      </div>

      <div class="bg-white rounded-2xl shadow-md border-2 border-black overflow-hidden">
        <div class="flex border-b-2 border-black">
          <button id="login-tab" onclick="showTab('login')" class="flex-1 py-3 font-bold text-sm bg-[#ed2079] text-white transition">Login</button>
          <button id="signup-tab" onclick="showTab('signup')" class="flex-1 py-3 font-bold text-sm text-gray-400 transition">Sign Up</button>
        </div>

        <div id="login-section" class="p-6 space-y-4">
          <div>
            <label class="text-xs font-bold text-gray-500 uppercase tracking-widest">Email</label>
            <input type="email" placeholder="you@example.com" class="w-full border-2 border-gray-200 rounded-xl px-4 py-2 mt-1 text-sm focus:outline-none focus:border-[#ed2079] transition" />
          </div>
          <div>
            <label class="text-xs font-bold text-gray-500 uppercase tracking-widest">Password</label>
            <input type="password" placeholder="••••••••" class="w-full border-2 border-gray-200 rounded-xl px-4 py-2 mt-1 text-sm focus:outline-none focus:border-[#ed2079] transition" />
          </div>
          <button onclick="window.location.href='index.html'" class="w-full bg-[#ed2079] text-white font-bold py-3 rounded-xl hover:brightness-110 transition text-sm">Login</button>
        </div>

        <div id="signup-section" class="hidden p-6 space-y-4">
          <div>
            <label class="text-xs font-bold text-gray-500 uppercase tracking-widest">Display Name</label>
            <input type="text" placeholder="TrainFan123" class="w-full border-2 border-gray-200 rounded-xl px-4 py-2 mt-1 text-sm focus:outline-none focus:border-[#ed2079] transition" />
          </div>
          <div>
            <label class="text-xs font-bold text-gray-500 uppercase tracking-widest">Email</label>
            <input type="email" placeholder="you@example.com" class="w-full border-2 border-gray-200 rounded-xl px-4 py-2 mt-1 text-sm focus:outline-none focus:border-[#ed2079] transition" />
          </div>
          <div>
            <label class="text-xs font-bold text-gray-500 uppercase tracking-widest">Password</label>
            <input type="password" placeholder="••••••••" class="w-full border-2 border-gray-200 rounded-xl px-4 py-2 mt-1 text-sm focus:outline-none focus:border-[#ed2079] transition" />
          </div>
          <button onclick="window.location.href='index.html'" class="w-full bg-[#ed2079] text-white font-bold py-3 rounded-xl hover:brightness-110 transition text-sm">Create Account</button>
        </div>
      </div>

    </div>

    <script>
      function showTab(tab) {
        const loginSection = document.getElementById('login-section');
        const signupSection = document.getElementById('signup-section');
        const loginTab = document.getElementById('login-tab');
        const signupTab = document.getElementById('signup-tab');

        if (tab === 'login') {
          loginSection.classList.remove('hidden');
          signupSection.classList.add('hidden');
          loginTab.classList.add('bg-[#ed2079]', 'text-white');
          loginTab.classList.remove('text-gray-400');
          signupTab.classList.remove('bg-[#ed2079]', 'text-white');
          signupTab.classList.add('text-gray-400');
        } else {
          signupSection.classList.remove('hidden');
          loginSection.classList.add('hidden');
          signupTab.classList.add('bg-[#ed2079]', 'text-white');
          signupTab.classList.remove('text-gray-400');
          loginTab.classList.remove('bg-[#ed2079]', 'text-white');
          loginTab.classList.add('text-gray-400');
        }
      }
    </script>
  </body>
</html>
