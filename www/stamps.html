<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&display=swap" rel="stylesheet" />
  <style>.cherry { font-family: 'Cherry Bomb One', cursive; }</style>
</head>
<body class="bg-transparent font-sans">
  <turbo-frame id="stamps-frame" class="w-full block">

    <!-- Header -->
    <div class="px-1 pt-2 pb-4">
      <div class="flex items-center justify-between mb-1">
        <h2 class="cherry text-2xl text-[#ed2079]">スタンプ帳</h2>
        <div class="flex items-center space-x-2">
          <span id="stamp-count" class="text-xs font-bold text-gray-400 bg-gray-100 dark:bg-gray-700 px-3 py-1 rounded-full">0 枚</span>
          <button onclick="openStampModal()"
            class="bg-[#ed2079] text-white text-xs font-bold px-3 py-2 rounded-xl hover:brightness-110 transition flex items-center space-x-1 shadow">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path d="M12 5v14M5 12h14" stroke-linecap="round"/>
            </svg>
            <span>記録する</span>
          </button>
        </div>
      </div>
      <p class="text-xs text-gray-400">スタンプが設置されている駅を訪問して収集しよう</p>
    </div>

    <!-- Stamp grid -->
    <div id="stamps-grid" class="grid grid-cols-4 gap-3"></div>

    <div class="h-4"></div>

    <!-- Stamp Recording Modal -->
    <div id="stamp-modal" style="display:none;position:fixed;inset:0;z-index:50;padding-bottom:env(safe-area-inset-bottom);">
      <!-- Backdrop -->
      <div onclick="closeStampModal()" style="position:absolute;inset:0;background:rgba(0,0,0,0.4);"></div>
      <!-- Sheet -->
      <div style="position:absolute;bottom:0;left:0;right:0;background:white;border-radius:24px 24px 0 0;border-top:4px solid #ed2079;padding:20px;max-width:400px;margin:0 auto;max-height:90vh;overflow-y:auto;">
        <div id="stamp-modal-dark" style="display:none;position:absolute;inset:0;border-radius:24px 24px 0 0;background:#1f2937;"></div>
        <div style="position:relative;z-index:1;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h3 id="stamp-modal-title" style="font-family:'Cherry Bomb One',cursive;color:#ed2079;font-size:18px;">スタンプを記録</h3>
            <button onclick="closeStampModal()" style="color:#9ca3af;background:none;border:none;cursor:pointer;">
              <svg style="width:24px;height:24px;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
          </div>
          <div style="display:flex;flex-direction:column;gap:12px;">
            <!-- Station name -->
            <div>
              <label id="sl1" style="font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:0.1em;">駅名</label>
              <input id="stamp-station" type="text" placeholder="例: 東京駅"
                style="width:100%;border:2px solid #e5e7eb;border-radius:12px;padding:8px 12px;margin-top:4px;font-size:14px;box-sizing:border-box;outline:none;transition:border-color 0.2s;"
                onfocus="this.style.borderColor='#ed2079'" onblur="this.style.borderColor='#e5e7eb'"/>
            </div>
            <!-- Date -->
            <div>
              <label id="sl2" style="font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:0.1em;">日時</label>
              <input id="stamp-date" type="datetime-local"
                style="width:100%;border:2px solid #e5e7eb;border-radius:12px;padding:8px 12px;margin-top:4px;font-size:14px;box-sizing:border-box;outline:none;transition:border-color 0.2s;"
                onfocus="this.style.borderColor='#ed2079'" onblur="this.style.borderColor='#e5e7eb'"/>
            </div>
            <!-- Photo upload -->
            <div>
              <label id="sl3" style="font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:0.1em;">写真</label>
              <label for="stamp-photo" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;border:2px dashed #e5e7eb;border-radius:12px;padding:16px;margin-top:4px;cursor:pointer;transition:border-color 0.2s;" onmouseenter="this.style.borderColor='#ed2079'" onmouseleave="this.style.borderColor='#e5e7eb'">
                <svg style="width:24px;height:24px;color:#9ca3af;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
                </svg>
                <span id="photo-label" style="font-size:12px;color:#9ca3af;">タップして写真を選択</span>
                <input id="stamp-photo" type="file" accept="image/*" style="display:none;" onchange="handlePhotoSelect(this)"/>
              </label>
            </div>
            <!-- Memo -->
            <div>
              <label id="sl4" style="font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:0.1em;">メモ</label>
              <textarea id="stamp-memo" placeholder="スタンプの感想、デザインなど..." rows="2"
                style="width:100%;border:2px solid #e5e7eb;border-radius:12px;padding:8px 12px;margin-top:4px;font-size:14px;box-sizing:border-box;outline:none;resize:none;transition:border-color 0.2s;font-family:inherit;"
                onfocus="this.style.borderColor='#ed2079'" onblur="this.style.borderColor='#e5e7eb'"></textarea>
            </div>
            <!-- Public checkbox -->
            <div style="display:flex;align-items:center;gap:8px;">
              <input type="checkbox" id="stamp-public" style="width:16px;height:16px;accent-color:#ed2079;"/>
              <label for="stamp-public" style="font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:0.05em;cursor:pointer;">フィードに投稿する</label>
            </div>
            <!-- Submit -->
            <button onclick="submitStamp()"
              style="width:100%;background:#ed2079;color:white;font-weight:700;padding:12px;border-radius:12px;border:none;cursor:pointer;font-size:14px;transition:filter 0.2s;"
              onmouseenter="this.style.filter='brightness(1.1)'" onmouseleave="this.style.filter='none'">
              記録する ✓
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Stations with stamps that this user has visited
      // In production: fetched from Firestore (stamp_stations × user visits)
      const STAMP_STATIONS = [
        { name: '東京',     emoji: '🚉', color: '#ed2079' },
        { name: '新橋',     emoji: '🗼', color: '#2BAAE2' },
        { name: '三軒茶屋', emoji: '🌸', color: '#009B73' },
        { name: '駒沢大学', emoji: '🎓', color: '#fbb03c' },
        { name: '桜新町',   emoji: '🌿', color: '#8b5cf6' },
        { name: '新宿',     emoji: '🏙️', color: '#ed2079' },
        { name: '渋谷',     emoji: '🎭', color: '#ff6f00' },
        { name: '原宿',     emoji: '⛩️', color: '#2BAAE2' },
        { name: '品川',     emoji: '🌊', color: '#009B73' },
        { name: '秋葉原',   emoji: '🏯', color: '#fbb03c' },
        { name: '上野',     emoji: '🎨', color: '#8b5cf6' },
        { name: '浅草',     emoji: '🎑', color: '#ff6f00' },
      ];

      const grid = document.getElementById('stamps-grid');
      const countEl = document.getElementById('stamp-count');

      countEl.textContent = STAMP_STATIONS.length + ' 枚';

      grid.innerHTML = STAMP_STATIONS.map(s => `
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;" onclick="showStampDetail('${s.name}','${s.color}')">
          <div style="width:64px;height:64px;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.12);border:3px solid ${s.color};transition:transform 0.15s;position:relative;overflow:hidden;">
            <!-- Outer ring -->
            <div style="position:absolute;inset:4px;border-radius:50%;border:2px dashed ${s.color};opacity:0.5;"></div>
            <!-- Check mark SVG -->
            <svg viewBox="0 0 24 24" fill="none" style="width:28px;height:28px;position:relative;z-index:1;">
              <path d="M20 6L9 17l-5-5" stroke="${s.color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <p style="font-size:9px;font-weight:700;color:#374151;text-align:center;line-height:1.2;max-width:60px;">${s.name}</p>
        </div>
      `).join('');

      // Hover effect on stamp circles
      grid.querySelectorAll('[style*="border-radius:50%"]').forEach(el => {
        el.addEventListener('mouseenter', () => el.style.transform = 'scale(1.1)');
        el.addEventListener('mouseleave', () => el.style.transform = 'scale(1)');
      });

      function showStampDetail(name, color) {
        // Future: open detail sheet with photo
      }
      window.showStampDetail = showStampDetail;

      // Modal functions
      function openStampModal() {
        const modal = document.getElementById('stamp-modal');
        modal.style.display = 'block';
        const now = new Date();
        document.getElementById('stamp-date').value = now.toISOString().slice(0,16);
        // Apply dark mode to modal if active
        const isDark = document.documentElement.classList.contains('dark');
        const sheet = modal.querySelector('[style*="background:white"]') || modal.children[1];
        if (isDark) {
          sheet.style.background = '#1f2937';
          modal.querySelectorAll('input,textarea').forEach(el => {
            el.style.background = '#374151';
            el.style.color = 'white';
            el.style.borderColor = '#4b5563';
          });
        }
      }
      function closeStampModal() {
        document.getElementById('stamp-modal').style.display = 'none';
      }
      function handlePhotoSelect(input) {
        if (input.files && input.files[0]) {
          document.getElementById('photo-label').textContent = input.files[0].name;
        }
      }
      function submitStamp() {
        const station = document.getElementById('stamp-station').value.trim();
        if (!station) {
          document.getElementById('stamp-station').style.borderColor = '#ef4444';
          document.getElementById('stamp-station').focus();
          return;
        }
        // Prototype: add to grid
        const colors = ['#ed2079','#2BAAE2','#009B73','#fbb03c','#8b5cf6','#ff6f00'];
        const color = colors[Math.floor(Math.random() * colors.length)];
        const div = document.createElement('div');
        div.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;';
        div.innerHTML = `
          <div style="width:64px;height:64px;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.12);border:3px solid ${color};transition:transform 0.15s;position:relative;overflow:hidden;">
            <div style="position:absolute;inset:4px;border-radius:50%;border:2px dashed ${color};opacity:0.5;"></div>
            <svg viewBox="0 0 24 24" fill="none" style="width:28px;height:28px;position:relative;z-index:1;">
              <path d="M20 6L9 17l-5-5" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <p style="font-size:9px;font-weight:700;color:#374151;text-align:center;line-height:1.2;max-width:60px;">${station}</p>
        `;
        grid.prepend(div);
        const count = grid.children.length;
        countEl.textContent = count + ' 枚';
        closeStampModal();
      }
      window.openStampModal = openStampModal;
      window.closeStampModal = closeStampModal;
      window.handlePhotoSelect = handlePhotoSelect;
      window.submitStamp = submitStamp;
    </script>

  </turbo-frame>
</body>
</html>
