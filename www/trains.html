<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
</head>
<body>
  <turbo-frame id="trains-frame" class="w-full space-y-6 block">

    <div class="bg-white border-4 border-[#8b5cf6] p-6 shadow-xl rounded-2xl">
      <h2 class="text-2xl font-bold text-[#8b5cf6] mb-4" style="font-family:'Cherry Bomb One',cursive;">Train Sightings</h2>

      <div class="bg-purple-50 border-2 border-[#8b5cf6] rounded-xl p-4 mb-6">
        <h3 class="font-bold text-sm text-[#8b5cf6] uppercase tracking-widest mb-3">Log New Sighting</h3>
        <div class="space-y-3">
          <div>
            <label class="text-xs font-bold text-gray-500 uppercase tracking-widest">Search Train Model</label>
            <div class="flex mt-1 space-x-2">
              <input type="text" placeholder="e.g. Skyliner AE1000" class="flex-1 border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-[#8b5cf6] transition" />
              <button class="bg-[#8b5cf6] text-white font-bold px-4 py-2 rounded-xl text-sm hover:brightness-110 transition">Search</button>
            </div>
          </div>
          <div>
            <label class="text-xs font-bold text-gray-500 uppercase tracking-widest">Date</label>
            <input type="date" class="w-full border-2 border-gray-200 rounded-xl px-3 py-2 mt-1 text-sm focus:outline-none focus:border-[#8b5cf6] transition" />
          </div>
          <div>
            <label class="text-xs font-bold text-gray-500 uppercase tracking-widest">Note</label>
            <textarea placeholder="Add a note..." rows="2" class="w-full border-2 border-gray-200 rounded-xl px-3 py-2 mt-1 text-sm focus:outline-none focus:border-[#8b5cf6] transition resize-none"></textarea>
          </div>
          <button class="w-full bg-[#8b5cf6] text-white font-bold py-2 rounded-xl text-sm hover:brightness-110 transition">Log Sighting</button>
        </div>
      </div>

      <div class="space-y-3">
        <h3 class="font-bold text-sm text-gray-500 uppercase tracking-widest">Recent Sightings</h3>

        <div class="flex items-center space-x-3 p-3 bg-purple-50 rounded-xl border border-purple-200">
          <div class="w-10 h-10 bg-[#8b5cf6] rounded-full flex items-center justify-center flex-shrink-0">
            <svg viewBox="0 0 24 24" fill="none" class="w-5 h-5 text-white stroke-current" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="8" width="20" height="11" rx="3"/><path d="M7 8V6a2 2 0 012-2h6a2 2 0 012 2v2M12 13v2M8 21l-1 1M16 21l1 1M5 19h14"/>
            </svg>
          </div>
          <div class="flex-1">
            <p class="font-bold text-purple-800 text-sm">Skyliner AE1000</p>
            <p class="text-xs text-gray-400">Spotted at Ueno — Feb 19</p>
          </div>
          <span class="text-[10px] bg-[#8b5cf6] text-white px-2 py-1 rounded-full font-bold">NEW!</span>
        </div>

        <div class="flex items-center space-x-3 p-3 bg-purple-50 rounded-xl border border-purple-200">
          <div class="w-10 h-10 bg-[#8b5cf6] rounded-full flex items-center justify-center flex-shrink-0">
            <svg viewBox="0 0 24 24" fill="none" class="w-5 h-5 text-white stroke-current" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="8" width="20" height="11" rx="3"/><path d="M7 8V6a2 2 0 012-2h6a2 2 0 012 2v2M12 13v2M8 21l-1 1M16 21l1 1M5 19h14"/>
            </svg>
          </div>
          <div class="flex-1">
            <p class="font-bold text-purple-800 text-sm">Tokyu 2020 Series</p>
            <p class="text-xs text-gray-400">Spotted at Sangen-Jaya — Feb 15</p>
          </div>
        </div>

        <div class="flex items-center space-x-3 p-3 bg-purple-50 rounded-xl border border-purple-200">
          <div class="w-10 h-10 bg-[#8b5cf6] rounded-full flex items-center justify-center flex-shrink-0">
            <svg viewBox="0 0 24 24" fill="none" class="w-5 h-5 text-white stroke-current" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="8" width="20" height="11" rx="3"/><path d="M7 8V6a2 2 0 012-2h6a2 2 0 012 2v2M12 13v2M8 21l-1 1M16 21l1 1M5 19h14"/>
            </svg>
          </div>
          <div class="flex-1">
            <p class="font-bold text-purple-800 text-sm">E235 Series (JR)</p>
            <p class="text-xs text-gray-400">Spotted at Shibuya — Feb 12</p>
          </div>
        </div>

      </div>
    </div>

  </turbo-frame>
</body>
</html>
